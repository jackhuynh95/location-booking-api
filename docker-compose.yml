services:
  postgres:
    image: postgres:16-alpine
    container_name: location-booking-postgres
    environment:
      POSTGRES_USER: location_booking
      POSTGRES_PASSWORD: location_booking
      POSTGRES_DB: location_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U location_booking -d location_booking"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - location_booking_network

volumes:
  postgres_data:

networks:
  location_booking_network:
    name: location-booking-network
